<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickey</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --border:#333;--border2:#444;
  --text:#e8e8e8;--text2:#999;--text3:#666;
  --p1:#e24b4a;--p2:#ef9f27;--p3:#378add;--p4:#639922;
  --accent:#378add;--radius:6px;
  --font:'Courier New',monospace;--font-size:13px;--row-padding:8px
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--font-size);min-height:100vh;transition:background 0.2s,color 0.2s}
body.day{--bg:#f5f0e8;--bg2:#ede8df;--bg3:#e3ddd3;--bg4:#d9d2c7;--border:#c9c2b5;--border2:#b8b0a2;--text:#1a1a1a;--text2:#555;--text3:#888;--p1:#c0302f;--p2:#b87010;--p3:#1a5fa0;--p4:#3a6b10;--accent:#1a5fa0}
body.text-sm{--font-size:11px}
body.text-md{--font-size:13px}
body.text-lg{--font-size:15px}
body.density-compact{--row-padding:4px}
body.density-comfortable{--row-padding:12px}

#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.auth-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:40px;width:320px;text-align:center}
.auth-logo{font-size:22px;font-weight:500;margin-bottom:8px;letter-spacing:-0.5px}
.auth-logo span{color:var(--p3)}
.auth-box p{color:var(--text2);font-size:12px;margin-bottom:24px}
.auth-box input{width:100%;padding:10px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:var(--font-size);margin-bottom:10px;text-align:center;letter-spacing:2px}
.auth-box input:focus{outline:none;border-color:var(--accent)}
.auth-box button{width:100%;padding:10px;background:transparent;border:0.5px solid var(--accent);border-radius:var(--radius);color:var(--accent);font-family:var(--font);font-size:var(--font-size);cursor:pointer}
.auth-box button:hover{background:rgba(55,138,221,0.1)}
.auth-error{color:var(--p1);font-size:11px;margin-top:8px;min-height:16px}

#app{display:none;padding:16px;max-width:1200px;margin:0 auto}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:500;letter-spacing:-0.5px;padding-right:12px;border-right:0.5px solid var(--border)}
.logo span{color:var(--p3)}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:5px 14px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--font);background:transparent;color:var(--text2)}
.tab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-new{padding:5px 14px;border:0.5px solid var(--p3);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--font);background:transparent;color:var(--p3)}
.btn-new:hover{background:rgba(55,138,221,0.1)}
.btn-settings{padding:5px 10px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:14px;font-family:var(--font);background:transparent;color:var(--text2)}
.btn-settings:hover{background:var(--bg3);color:var(--text)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;border:0.5px solid var(--border)}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:0.4px}
.stat-val{font-size:20px;font-weight:500}
.p1c{color:var(--p1)}.p2c{color:var(--p2)}.p3c{color:var(--p3)}.p4c{color:var(--p4)}

.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500;letter-spacing:0.3px}
.pill-p1{background:#501313;color:#f09595}.pill-p2{background:#412402;color:#fac775}
.pill-p3{background:#042c53;color:#85b7eb}.pill-p4{background:#173404;color:#97c459}
body.day .pill-p1{background:#fcd0d0;color:#8b1a1a}
body.day .pill-p2{background:#fde8c0;color:#7a4a00}
body.day .pill-p3{background:#cce0f5;color:#0d3d6b}
body.day .pill-p4{background:#d5edc0;color:#1e4a00}
.pill-idea{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border)}
.pill-progress{background:#412402;color:#fac775}
.pill-resolved{background:#173404;color:#97c459}
.pill-archived{background:var(--bg3);color:var(--text3)}
body.day .pill-progress{background:#fde8c0;color:#7a4a00}
body.day .pill-resolved{background:#d5edc0;color:#1e4a00}
.tag-pill{background:var(--bg3);border:0.5px solid var(--border);color:var(--text2);padding:2px 6px;border-radius:3px;font-size:10px}

.filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filters select{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:11px;padding:4px 8px;cursor:pointer}
.filter-label{font-size:11px;color:var(--text3)}
.arch-toggle{font-size:11px;color:var(--p3);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0}

/* LIST — id | title | pri | status | due | est | tags | [quick] | [edit] */
.list-header{display:grid;grid-template-columns:95px 1fr 65px 90px 80px 60px 80px 58px 28px;gap:6px;padding:6px 10px;border-bottom:0.5px solid var(--border);font-size:10px;color:var(--text3);letter-spacing:0.4px}
.list-row{display:grid;grid-template-columns:95px 1fr 65px 90px 80px 60px 80px 58px 28px;gap:6px;padding:var(--row-padding) 10px;border-bottom:0.5px solid var(--border);align-items:center;cursor:pointer;position:relative}
.list-row:hover{background:var(--bg2)}
.list-row.archived-row{opacity:0.45}
.list-row.child-row{background:rgba(255,255,255,0.02)}
.list-row.child-row:hover{background:var(--bg2)}
body.day .list-row.child-row{background:rgba(0,0,0,0.02)}
.ticket-id{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px;min-width:0}
.ticket-id-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ticket-title{font-size:var(--font-size);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-tags{display:flex;gap:3px;flex-wrap:wrap}
.row-action{display:flex;gap:4px;justify-content:flex-end;align-items:center}
.icon-btn{width:24px;height:24px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
.expand-btn{width:16px;height:16px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:9px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0;padding:0;line-height:1}
.expand-btn:hover{background:var(--bg3);color:var(--text)}
/* quick in-progress button — hidden until row hover */
.btn-quick-prog{padding:2px 8px;border:0.5px solid var(--p3);border-radius:3px;font-size:10px;font-family:var(--font);background:transparent;color:var(--p3);cursor:pointer;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s}
.list-row:hover .btn-quick-prog{opacity:1;pointer-events:auto}

.kanban{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;align-items:start}
.col-header{font-size:11px;font-weight:500;letter-spacing:0.5px;padding:0 0 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);margin-bottom:8px}
.col-count{background:var(--bg3);border-radius:10px;padding:1px 7px;font-size:10px}
.k-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px;cursor:pointer}
.k-card:hover{border-color:var(--border2)}
.k-child{margin-left:12px;border-left:2px solid var(--border2)}
.k-card-id{font-size:10px;color:var(--text3);margin-bottom:4px}
.k-card-title{font-size:var(--font-size);margin-bottom:8px;line-height:1.4}
.k-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto}
body.day .overlay{background:rgba(0,0,0,0.4)}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;width:100%;max-width:560px;padding:22px}
.modal-title{font-size:14px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;color:var(--text)}
.field-group{margin-bottom:12px}
.field-label{font-size:10px;color:var(--text3);margin-bottom:4px;letter-spacing:0.4px}
input,select,textarea{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:var(--font-size);padding:8px 10px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:70px}
select option{background:var(--bg3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;border-top:0.5px solid var(--border);padding-top:12px;flex-wrap:wrap}
.btn-pri{padding:6px 18px;border:0.5px solid var(--p3);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--font);background:rgba(55,138,221,0.1);color:var(--p3)}
.btn-sec{padding:6px 14px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--font);background:transparent;color:var(--text2)}
.btn-danger{padding:6px 14px;border:0.5px solid var(--p1);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--font);background:transparent;color:var(--p1)}
.btn-child{padding:6px 14px;border:0.5px solid var(--p4);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--font);background:transparent;color:var(--p4)}
.btn-resolve{padding:6px 14px;border:0.5px solid var(--p4);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--font);background:rgba(99,153,34,0.1);color:var(--p4)}
.detail-section{margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid var(--border)}
.detail-row{display:grid;grid-template-columns:110px 1fr;gap:8px;margin-bottom:6px;font-size:12px}
.detail-key{color:var(--text3)}
/* status selector inline in detail */
.status-select{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:12px;padding:2px 6px;width:auto;cursor:pointer}
.comment-item{background:var(--bg3);border-radius:var(--radius);padding:8px 10px;margin-bottom:6px;font-size:12px;line-height:1.5;border:0.5px solid var(--border)}
.comment-item.system{border-color:var(--border);opacity:0.7;font-style:italic}
.comment-ts{font-size:10px;color:var(--text3);margin-top:4px}
.empty-col{font-size:11px;color:var(--text3);padding:12px 0;text-align:center}
.child-link{font-size:11px;color:var(--p3);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0;text-align:left}
.child-link:hover{text-decoration:underline}
.parent-badge{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:0.5px solid var(--border);border-radius:3px;padding:2px 8px;font-size:10px;color:var(--text2);cursor:pointer}
.parent-badge:hover{border-color:var(--border2);color:var(--text)}

/* resolve dialog */
.resolve-modal{max-width:400px}

/* settings */
.settings-modal{max-width:440px}
.settings-section{margin-bottom:20px;padding-bottom:20px;border-bottom:0.5px solid var(--border)}
.settings-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.settings-section-title{font-size:10px;color:var(--text3);letter-spacing:0.5px;margin-bottom:12px}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:12px}
.setting-row:last-child{margin-bottom:0}
.setting-label{color:var(--text2)}
.seg{display:flex;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.seg button{padding:5px 10px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:11px;cursor:pointer;border-right:0.5px solid var(--border)}
.seg button:last-child{border-right:none}
.seg button.active{background:var(--bg3);color:var(--text)}
.seg button:hover:not(.active){background:var(--bg4)}
.toggle{position:relative;width:36px;height:20px}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border2);border-radius:10px;cursor:pointer;transition:background 0.2s}
.toggle input:checked+.toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform 0.2s;pointer-events:none}
.toggle input:checked~.toggle-thumb{transform:translateX(16px)}
/* font preview */
.font-option{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:6px}
.font-option.active{border-color:var(--accent);background:var(--bg3)}
.font-option:hover:not(.active){background:var(--bg3)}
.font-preview{font-size:13px;color:var(--text2)}
.font-name{font-size:10px;color:var(--text3)}

.loading{text-align:center;padding:60px;color:var(--text3);font-size:12px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:12px;z-index:200;opacity:0;transition:opacity 0.2s}
.toast.show{opacity:1}
.toast.error{border-color:var(--p1);color:var(--p1)}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo"><span>[</span>Stickey<span>]</span></div>
    <p>Personal planner</p>
    <input type="password" id="pw-input" placeholder="enter password" onkeydown="if(event.key==='Enter')tryAuth()">
    <button onclick="tryAuth()">SIGN IN</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const STATUSES=['Idea','In Progress','Resolved','Archived'];
const PRIORITIES=['P1','P2','P3','P4'];
const DEFAULT_TAGS=['bug','feature','chore','personal','work','health','finance','learning'];
const SETTINGS_KEY='stickey_settings';

const FONTS=[
  {val:"'Courier New',monospace",     label:'Courier New',   preview:'TKT-0001 — Fix the bug'},
  {val:"'JetBrains Mono',monospace",  label:'JetBrains Mono',preview:'TKT-0001 — Fix the bug'},
  {val:"'Georgia',serif",             label:'Georgia',       preview:'TKT-0001 — Fix the bug'},
  {val:"'Palatino Linotype',serif",   label:'Palatino',      preview:'TKT-0001 — Fix the bug'},
  {val:"'Trebuchet MS',sans-serif",   label:'Trebuchet MS',  preview:'TKT-0001 — Fix the bug'},
  {val:"'Verdana',sans-serif",        label:'Verdana',       preview:'TKT-0001 — Fix the bug'},
  {val:"system-ui,sans-serif",        label:'System UI',     preview:'TKT-0001 — Fix the bug'},
];

const defaultSettings={
  theme:'night',textSize:'md',density:'comfortable',
  defaultView:'list',defaultPriority:'P3',
  confirmArchive:true,showStats:true,
  font:"'Courier New',monospace"
};
let settings={...defaultSettings,...JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')};
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings));applySettings();}
function applySettings(){
  const b=document.body;
  b.classList.toggle('day',settings.theme==='day');
  b.classList.remove('text-sm','text-md','text-lg');b.classList.add('text-'+settings.textSize);
  b.classList.remove('density-compact','density-comfortable');b.classList.add('density-'+settings.density);
  b.style.setProperty('--font',settings.font||defaultSettings.font);
}
applySettings();

let apiSecret=sessionStorage.getItem('stickey_secret')||'';
let tickets=[];
let view=settings.defaultView;
let filterStatus='',filterPriority='',filterTag='';
let showArchived=false;
let modal=null,editTicket=null,detailTicket=null,newChildParent=null;
let expandedIds=new Set();

// ── NUMBERING ─────────────────────────────────────────────
function letterSuffix(n){
  const chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const base=chars.length;
  if(n<base)return chars[n];
  n-=base;let result='';
  do{result=chars[n%base]+result;n=Math.floor(n/base)-1;}while(n>=0);
  return result;
}
function nextSuffixType(id){return /\d/.test(id.slice(-1))?'letter':'number';}
function nextChildRecordId(parentId){
  const children=tickets.filter(t=>t.parentRecordId===parentId);
  const type=nextSuffixType(parentId);
  if(type==='letter'){
    const used=new Set(children.map(t=>t.recordId.slice(parentId.length)));
    let i=0;while(used.has(letterSuffix(i)))i++;
    return parentId+letterSuffix(i);
  } else {
    const used=new Set(children.map(t=>parseInt(t.recordId.slice(parentId.length))||0));
    let i=1;while(used.has(i))i++;
    return parentId+String(i);
  }
}
function nextRootRecordId(){
  const existing=new Set(tickets.map(t=>t.recordId));
  const rootNums=tickets.filter(t=>!t.parentRecordId).map(t=>parseInt(t.recordId)||0);
  let c=(rootNums.length?Math.max(...rootNums):0)+1;
  while(existing.has(String(c)))c++;
  return String(c);
}

// ── AUTH ──────────────────────────────────────────────────
async function tryAuth(){
  const pw=document.getElementById('pw-input').value.trim();
  if(!pw)return;
  const res=await fetch('/api/tickets',{headers:{'x-api-secret':pw}});
  if(res.status===401){document.getElementById('auth-error').textContent='incorrect password';return;}
  apiSecret=pw;sessionStorage.setItem('stickey_secret',pw);
  tickets=await res.json();
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}
if(apiSecret){
  fetch('/api/tickets',{headers:{'x-api-secret':apiSecret}}).then(r=>r.ok?r.json():null).then(data=>{
    if(data){tickets=data;document.getElementById('auth-screen').style.display='none';document.getElementById('app').style.display='block';render();}
    else{sessionStorage.removeItem('stickey_secret');apiSecret='';}
  });
}

// ── API ───────────────────────────────────────────────────
async function apiFetch(path,method='GET',body=null){
  const opts={method,headers:{'x-api-secret':apiSecret,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(path,opts);
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(err?' error':'');
  setTimeout(()=>el.className='toast',2200);
}

// ── HELPERS ───────────────────────────────────────────────
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTs(ts){const d=new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function pilStatus(s){const m={Idea:'pill-idea','In Progress':'pill-progress',Resolved:'pill-resolved',Archived:'pill-archived'};return `<span class="pill ${m[s]||'pill-idea'}">${s}</span>`;}
function pilPri(p){return `<span class="pill pill-${p.toLowerCase()}">${p}</span>`;}
function allTags(){const tags=new Set(DEFAULT_TAGS);tickets.forEach(t=>(t.tags||[]).forEach(g=>tags.add(g)));return[...tags];}
function getTickets(){
  let t=tickets;
  if(!showArchived)t=t.filter(x=>x.status!=='Archived');
  if(filterStatus)t=t.filter(x=>x.status===filterStatus);
  if(filterPriority)t=t.filter(x=>x.priority===filterPriority);
  if(filterTag)t=t.filter(x=>x.tags&&x.tags.includes(filterTag));
  return t;
}
function getChildren(recordId){return tickets.filter(t=>t.parentRecordId===recordId);}
function sysComment(text){return {text,ts:Date.now(),system:true};}

// ── RENDER ────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const allVis=getTickets();
  const rootVis=allVis.filter(t=>!t.parentRecordId);
  const total=tickets.filter(x=>x.status!=='Archived'&&!x.parentRecordId).length;
  const p1=tickets.filter(x=>x.priority==='P1'&&x.status!=='Archived'&&x.status!=='Resolved').length;
  const inprog=tickets.filter(x=>x.status==='In Progress').length;
  const resolved=tickets.filter(x=>x.status==='Resolved').length;

  let html=`<div class="topbar">
    <div class="logo"><span>[</span>Stickey<span>]</span></div>
    ${settings.showStats?`<div class="stats" style="margin:0;flex:1;min-width:280px">
      <div class="stat"><div class="stat-label">OPEN</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-label">P1 CRITICAL</div><div class="stat-val p1c">${p1}</div></div>
      <div class="stat"><div class="stat-label">IN PROGRESS</div><div class="stat-val p3c">${inprog}</div></div>
      <div class="stat"><div class="stat-label">RESOLVED</div><div class="stat-val p4c">${resolved}</div></div>
    </div>`:'<div style="flex:1"></div>'}
    <div class="tabs">
      <button class="tab ${view==='list'?'active':''}" onclick="setView('list')">LIST</button>
      <button class="tab ${view==='kanban'?'active':''}" onclick="setView('kanban')">KANBAN</button>
    </div>
    <button class="btn-settings" onclick="openSettings()" title="Settings">&#9881;</button>
    <button class="btn-new" onclick="openNew()">+ NEW</button>
  </div>
  <div class="filters">
    <span class="filter-label">FILTER:</span>
    <select onchange="filterStatus=this.value;render()">
      <option value="">All statuses</option>
      ${STATUSES.map(s=>`<option value="${s}" ${filterStatus===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <select onchange="filterPriority=this.value;render()">
      <option value="">All priorities</option>
      ${PRIORITIES.map(p=>`<option value="${p}" ${filterPriority===p?'selected':''}>${p}</option>`).join('')}
    </select>
    <select onchange="filterTag=this.value;render()">
      <option value="">All tags</option>
      ${allTags().map(t=>`<option value="${t}" ${filterTag===t?'selected':''}>${t}</option>`).join('')}
    </select>
    <button class="arch-toggle" onclick="showArchived=!showArchived;render()">${showArchived?'Hide':'Show'} archived</button>
  </div>`;

  html+=view==='list'?renderList(rootVis):renderKanban();
  if(modal==='new'||modal==='edit')html+=renderFormModal();
  if(modal==='detail'&&detailTicket)html+=renderDetailModal();
  if(modal==='resolve'&&detailTicket)html+=renderResolveModal();
  if(modal==='settings')html+=renderSettingsModal();
  app.innerHTML=html;
}

function renderList(rootTickets){
  if(!rootTickets.length)return`<div class="loading">No tickets found. Click + NEW to get started.</div>`;
  let rows='';
  function renderRow(t,depth){
    const dc=getChildren(t.recordId).filter(c=>showArchived||c.status!=='Archived');
    const hasKids=dc.length>0;
    const isExp=expandedIds.has(t.recordId);
    const pad=depth*18;
    const canQuick=t.status==='Idea'||t.status==='Open';
    rows+=`<div class="list-row ${t.status==='Archived'?'archived-row':''} ${depth>0?'child-row':''}" onclick="openDetail('${t._id}')">
      <div class="ticket-id" style="padding-left:${pad}px">
        ${hasKids?`<button class="expand-btn" onclick="event.stopPropagation();toggleExpand('${t.recordId}')">${isExp?'▾':'▸'}</button>`:'<span style="width:16px;display:inline-block;flex-shrink:0"></span>'}
        <span class="ticket-id-text">${esc(t.recordId)}</span>
      </div>
      <div class="ticket-title">${esc(t.title)}</div>
      <div>${pilPri(t.priority)}</div>
      <div>${pilStatus(t.status)}</div>
      <div style="font-size:11px;color:var(--text2)">${fmtDate(t.due)}</div>
      <div style="font-size:11px;color:var(--text2)">${t.estimate?t.estimate+'h':'—'}</div>
      <div class="ticket-tags">${(t.tags||[]).slice(0,2).map(g=>`<span class="tag-pill">${g}</span>`).join('')}</div>
      <div style="display:flex;align-items:center;justify-content:center" onclick="event.stopPropagation()">
        ${canQuick?`<button class="btn-quick-prog" onclick="quickProgress('${t._id}')">▶ Start</button>`:''}
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end" onclick="event.stopPropagation()">
        <button class="icon-btn" onclick="openEdit('${t._id}')">✎</button>
      </div>
    </div>`;
    if(hasKids&&isExp)dc.forEach(c=>renderRow(c,depth+1));
  }
  rootTickets.forEach(t=>renderRow(t,0));
  return`<div><div class="list-header"><div>ID</div><div>TITLE</div><div>PRIORITY</div><div>STATUS</div><div>DUE</div><div>EST</div><div>TAGS</div><div></div><div></div></div>${rows}</div>`;
}

function renderKanban(){
  const cols=showArchived?STATUSES:STATUSES.filter(c=>c!=='Archived');
  let html=`<div class="kanban" style="grid-template-columns:repeat(${cols.length},minmax(0,1fr))">`;
  cols.forEach(col=>{
    let ct=tickets.filter(t=>t.status===col&&!t.parentRecordId);
    if(filterPriority)ct=ct.filter(t=>t.priority===filterPriority);
    if(filterTag)ct=ct.filter(t=>t.tags&&t.tags.includes(filterTag));
    html+=`<div><div class="col-header"><span>${col.toUpperCase()}</span><span class="col-count">${ct.length}</span></div>`;
    if(!ct.length)html+=`<div class="empty-col">empty</div>`;
    function kCard(t,depth){
      const ch=getChildren(t.recordId).filter(c=>c.status===col||(showArchived&&c.status==='Archived'));
      html+=`<div class="k-card ${depth>0?'k-child':''}" onclick="openDetail('${t._id}')">
        <div class="k-card-id">${esc(t.recordId)}</div>
        <div class="k-card-title">${esc(t.title)}</div>
        <div class="k-card-meta">${pilPri(t.priority)}${t.due?`<span style="font-size:10px;color:var(--text3)">${fmtDate(t.due)}</span>`:''}${(t.tags||[]).slice(0,1).map(g=>`<span class="tag-pill">${g}</span>`).join('')}${ch.length?`<span style="font-size:10px;color:var(--text3)">${ch.length} sub</span>`:''}</div>
      </div>`;
      if(depth<2)ch.forEach(c=>kCard(c,depth+1));
    }
    ct.forEach(t=>kCard(t,0));
    html+=`</div>`;
  });
  return html+'</div>';
}

// ── ACTIONS ───────────────────────────────────────────────
function setView(v){view=v;render();}
function closeModal(){modal=null;editTicket=null;detailTicket=null;newChildParent=null;render();}
function openNew(){modal='new';editTicket=null;newChildParent=null;render();}
function openEdit(id){editTicket=tickets.find(t=>t._id===id);modal='edit';detailTicket=null;newChildParent=null;render();}
function openDetail(id){detailTicket=tickets.find(t=>t._id===id);modal='detail';render();}
function openSettings(){modal='settings';render();}
function openResolve(id){detailTicket=tickets.find(t=>t._id===id);modal='resolve';render();}
function navToTicket(id){detailTicket=tickets.find(t=>t._id===id);modal='detail';render();}
function toggleExpand(recordId){if(expandedIds.has(recordId))expandedIds.delete(recordId);else expandedIds.add(recordId);render();}
function openNewChild(parentId){newChildParent=tickets.find(t=>t._id===parentId);modal='new';detailTicket=null;editTicket=null;render();}
function setSetting(key,val){settings[key]=val;saveSettings();render();}
function resetSettings(){settings={...defaultSettings};saveSettings();render();}

function readForm(){
  const parentEl=document.getElementById('f-parent');
  return{
    title:document.getElementById('f-title').value.trim(),
    description:document.getElementById('f-desc').value.trim(),
    priority:document.getElementById('f-priority').value,
    status:document.getElementById('f-status').value,
    due:document.getElementById('f-due').value||null,
    estimate:parseFloat(document.getElementById('f-estimate').value)||null,
    tags:document.getElementById('f-tags').value.split(',').map(x=>x.trim()).filter(Boolean),
    parentRecordId:parentEl?parentEl.value||null:null
  };
}

async function saveNew(){
  const f=readForm();
  if(!f.title){toast('Title is required',true);return;}
  if(newChildParent&&!f.parentRecordId)f.parentRecordId=newChildParent.recordId;
  const recordId=f.parentRecordId?nextChildRecordId(f.parentRecordId):nextRootRecordId();
  if(tickets.find(t=>t.recordId===recordId)){toast('Record ID conflict, please retry',true);return;}
  f.recordId=recordId;
  try{
    const created=await apiFetch('/api/tickets','POST',f);
    tickets.unshift(created);
    // auto-comment on parent that a child was created
    if(f.parentRecordId){
      expandedIds.add(f.parentRecordId);
      const parent=tickets.find(t=>t.recordId===f.parentRecordId);
      if(parent){
        const comments=[...(parent.comments||[]),sysComment(`Child ticket ${recordId} created: "${f.title}"`)];
        await apiFetch(`/api/tickets/${parent._id}`,'PATCH',{comments});
        const pi=tickets.findIndex(t=>t._id===parent._id);
        tickets[pi]={...parent,comments,updatedAt:Date.now()};
      }
    }
    closeModal();toast('Ticket '+recordId+' created');
  }catch(e){toast('Error creating ticket',true);}
}

async function saveEdit(id){
  const f=readForm();
  if(!f.title){toast('Title is required',true);return;}
  const commentText=document.getElementById('f-comment')?.value.trim();
  const existing=tickets.find(t=>t._id===id);
  const comments=[...(existing.comments||[])];
  // auto-comment if status changed
  if(f.status!==existing.status){
    comments.push(sysComment(`Status changed: ${existing.status} → ${f.status}`));
  }
  if(commentText)comments.push({text:commentText,ts:Date.now()});
  const updates={...f,comments};
  // stamp resolvedAt if transitioning to Resolved
  if(f.status==='Resolved'&&existing.status!=='Resolved')updates.resolvedAt=Date.now();
  if(f.status!=='Resolved'&&existing.status==='Resolved')updates.resolvedAt=null;
  try{
    await apiFetch(`/api/tickets/${id}`,'PATCH',updates);
    const idx=tickets.findIndex(t=>t._id===id);
    tickets[idx]={...existing,...updates,updatedAt:Date.now()};
    closeModal();toast('Ticket updated');
  }catch(e){toast('Error updating ticket',true);}
}

async function changeStatus(id,newStatus){
  const existing=tickets.find(t=>t._id===id);
  if(!existing||existing.status===newStatus)return;
  // if changing to Resolved, open the resolve dialog instead
  if(newStatus==='Resolved'){
    detailTicket=existing;modal='resolve';render();return;
  }
  const comments=[...(existing.comments||[]),sysComment(`Status changed: ${existing.status} → ${newStatus}`)];
  const updates={status:newStatus,comments};
  if(newStatus!=='Resolved')updates.resolvedAt=null;
  try{
    await apiFetch(`/api/tickets/${id}`,'PATCH',updates);
    const idx=tickets.findIndex(t=>t._id===id);
    tickets[idx]={...existing,...updates,updatedAt:Date.now()};
    detailTicket=tickets[idx];render();toast('Status updated');
  }catch(e){toast('Error updating status',true);}
}

async function confirmResolve(id){
  const closingComment=document.getElementById('resolve-comment')?.value.trim();
  const existing=tickets.find(t=>t._id===id);
  const comments=[...(existing.comments||[]),sysComment(`Status changed: ${existing.status} → Resolved`)];
  if(closingComment)comments.push({text:closingComment,ts:Date.now()});
  const resolvedAt=Date.now();
  try{
    await apiFetch(`/api/tickets/${id}`,'PATCH',{status:'Resolved',resolvedAt,comments});
    const idx=tickets.findIndex(t=>t._id===id);
    tickets[idx]={...existing,status:'Resolved',resolvedAt,comments,updatedAt:Date.now()};
    detailTicket=tickets[idx];modal='detail';render();toast('Ticket resolved');
  }catch(e){toast('Error resolving ticket',true);}
}

async function quickProgress(id){
  const existing=tickets.find(t=>t._id===id);
  if(!existing)return;
  const comments=[...(existing.comments||[]),sysComment(`Status changed: ${existing.status} → In Progress`)];
  try{
    await apiFetch(`/api/tickets/${id}`,'PATCH',{status:'In Progress',comments});
    const idx=tickets.findIndex(t=>t._id===id);
    tickets[idx]={...existing,status:'In Progress',comments,updatedAt:Date.now()};
    render();toast('Moved to In Progress');
  }catch(e){toast('Error updating ticket',true);}
}

async function addComment(id){
  const txt=document.getElementById('inline-comment').value.trim();
  if(!txt)return;
  const existing=tickets.find(t=>t._id===id);
  const comments=[...(existing.comments||[]),{text:txt,ts:Date.now()}];
  try{
    await apiFetch(`/api/tickets/${id}`,'PATCH',{comments});
    const idx=tickets.findIndex(t=>t._id===id);
    tickets[idx]={...existing,comments,updatedAt:Date.now()};
    detailTicket=tickets[idx];render();toast('Comment added');
  }catch(e){toast('Error adding comment',true);}
}

async function archiveTicket(id,currentStatus){
  const newStatus=currentStatus==='Archived'?'Idea':'Archived';
  if(settings.confirmArchive&&newStatus==='Archived'){if(!confirm('Archive this ticket?'))return;}
  const existing=tickets.find(t=>t._id===id);
  const comments=[...(existing.comments||[]),sysComment(`Status changed: ${currentStatus} → ${newStatus}`)];
  try{
    await apiFetch(`/api/tickets/${id}`,'PATCH',{status:newStatus,comments});
    const idx=tickets.findIndex(t=>t._id===id);
    tickets[idx]={...tickets[idx],status:newStatus,comments,updatedAt:Date.now()};
    closeModal();toast(newStatus==='Archived'?'Ticket archived':'Ticket restored');
  }catch(e){toast('Error updating ticket',true);}
}
</script>
</body>
</html>
